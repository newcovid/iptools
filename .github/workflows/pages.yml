name: Deploy GitHub Pages

env:
  NO_COLOR: "true"

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install trunk --version 0.21.14 --locked
      - name: Build portable Web artifact
        shell: pwsh
        run: ./scripts/build-web.ps1 -PublicUrl ./
      - uses: actions/upload-artifact@v7
        with:
          name: iptools-web-portable
          path: crates/iptools-web/dist
          retention-days: 30
      - name: Build Pages artifact
        shell: pwsh
        run: ./scripts/build-web.ps1 -PublicUrl /iptools/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: crates/iptools-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
