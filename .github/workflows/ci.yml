name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NO_COLOR: "true"

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release

  wasm:
    name: WebAssembly and architecture
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check crate boundaries
        shell: pwsh
        run: ./scripts/check-architecture.ps1

      - name: Check WebAssembly crate
        run: cargo check -p iptools-web --target wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install trunk --version 0.21.14 --locked

      - name: Build Web exhibit
        shell: pwsh
        run: ./scripts/build-web.ps1

      - name: Enforce Web size budget
        shell: pwsh
        run: ./scripts/check-web-size.ps1

  browser:
    name: Browser (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --version 0.21.14 --locked

      - name: Install browser dependencies
        working-directory: crates/iptools-web
        run: |
          npm ci
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start Web exhibit
        working-directory: crates/iptools-web
        run: |
          trunk serve --address 127.0.0.1 --port 8099 > /tmp/iptools-trunk.log 2>&1 &
          for i in {1..90}; do curl --fail --silent http://127.0.0.1:8099/ >/dev/null && exit 0; sleep 1; done
          cat /tmp/iptools-trunk.log
          exit 1

      - name: Run browser interaction tests
        working-directory: crates/iptools-web
        env:
          IPTOOLS_BROWSER: ${{ matrix.browser }}
          IPTOOLS_WEB_URL: http://127.0.0.1:8099/
        run: node tests/e2e.mjs

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit
