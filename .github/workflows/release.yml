name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Publish (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $name = "iptools-$tag-windows-x86_64"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/iptools.exe "dist/$name.exe"
          Compress-Archive -Path "dist/$name.exe", README.md, LICENSE, config.example.json `
            -DestinationPath "dist/$name.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.zip
