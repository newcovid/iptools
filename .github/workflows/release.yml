name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        shell: pwsh
        run: |
          $name = "iptools-${{ github.ref_name }}-windows-x86_64"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/iptools.exe "dist/$name.exe"
          Compress-Archive -Path "dist/$name.exe", README.md, LICENSE, config.example.json `
            -DestinationPath "dist/$name.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: dist/*
          if-no-files-found: error

  linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        run: |
          name="iptools-${{ github.ref_name }}-linux-x86_64"
          mkdir -p "dist/$name"
          cp target/release/iptools "dist/$name/"
          cp README.md LICENSE config.example.json install.sh "dist/$name/"
          chmod +x "dist/$name/iptools" "dist/$name/install.sh"
          tar -czf "dist/$name.tar.gz" -C dist "$name"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
