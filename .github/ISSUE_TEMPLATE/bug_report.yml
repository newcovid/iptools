name: Bug 报告
description: 报告可复现的错误或异常行为
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请先确认问题可在最新版本复现，并移除配置中的敏感信息。
  - type: input
    id: version
    attributes:
      label: iptools 版本
      placeholder: v0.3.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      options:
        - Windows
        - Linux
        - 其它
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 系统版本、终端、网卡类型、是否以管理员/root/CAP_NET_RAW 运行等。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 选择……
        3. 观察到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为与日志
      description: 可附截图或日志；请删除公网 IP、MAC、SSID 等隐私数据。
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
        - label: 我已删除日志和截图中的敏感网络信息。
          required: true
