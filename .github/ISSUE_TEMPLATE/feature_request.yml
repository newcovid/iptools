name: 功能建议
description: 提议新的能力或交互改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景与问题
      description: 请描述你想解决的实际问题，而不只是方案名称。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明期望交互、适用平台和可能的权限要求。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 可选方案
      description: 你尝试过的替代方法或可以接受的简化范围。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
